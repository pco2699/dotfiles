name: Kick CI for bot pushes

# Pushes made by GitHub Apps (e.g. Claude Code) don't generate workflow runs -
# GitHub suppresses events created by integration tokens to prevent recursion.
# workflow_dispatch is the documented exception: runs it creates are allowed
# even when triggered with GITHUB_TOKEN. This scheduled job finds open PR head
# commits that have no "Test install" run yet and dispatches one for them.
#
# Note: scheduled workflows only run from the default branch, so this takes
# effect once it lands on master.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  actions: write
  pull-requests: read
  contents: read

jobs:
  kick:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prs = await github.rest.pulls.list({ owner, repo, state: "open", per_page: 50 });
            for (const pr of prs.data) {
              // skip forks: their branches can't be dispatched in this repo
              if (pr.head.repo.full_name !== `${owner}/${repo}`) continue;
              const runs = await github.rest.actions.listWorkflowRuns({
                owner, repo,
                workflow_id: "install.yml",
                head_sha: pr.head.sha,
                per_page: 1,
              });
              if (runs.data.total_count === 0) {
                core.info(`Dispatching install.yml for ${pr.head.ref} @ ${pr.head.sha}`);
                await github.rest.actions.createWorkflowDispatch({
                  owner, repo,
                  workflow_id: "install.yml",
                  ref: pr.head.ref,
                });
              }
            }
