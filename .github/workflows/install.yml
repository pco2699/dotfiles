name: Test install

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Take the same fast path as Codespaces: skip fisher and the mise
  # language-runtime installs (compiling Python/Node/Go in CI is too slow).
  # The distro system packages and the fast mise CLI-tool installs still run
  # in full, so the verify step below can check every CLI tool.
  CODESPACES: "true"
  # mise resolves tool versions via the GitHub API (aqua/vfox/ubi backends).
  # Without a token it uses the 60/hr unauthenticated limit and fails in CI;
  # the built-in Actions token raises this to 5000/hr.
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  ubuntu:
    name: Ubuntu (runner)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"

      - name: chezmoi init + apply
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          chezmoi init --apply --source="$GITHUB_WORKSPACE"

      - name: Verify installation
        run: |
          export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$PATH"
          for cmd in fish nvim gh fd rg zoxide bat fzf eza mise herdr claude; do
            command -v "$cmd" || { echo "::error::$cmd not found"; exit 1; }
          done
          test -f ~/.config/fish/config.fish
          test -f ~/.config/herdr/config.toml
          test -f ~/.config/nvim/init.lua

  linux-container:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Debian 13
            image: debian:13
            bootstrap: apt-get update && apt-get install -y sudo curl git ca-certificates
            # all CLI tools now come from mise under their canonical names
            commands: fish nvim gh fd rg zoxide bat fzf eza mise herdr claude
          - name: Fedora (latest)
            image: fedora:latest
            bootstrap: dnf install -y sudo curl git tar gzip
            # all CLI tools now come from mise under their canonical names
            commands: fish nvim gh fd rg zoxide bat fzf eza mise herdr claude
    steps:
      # A bare container image needs the tools chezmoi's install script
      # takes for granted (a fresh interactive machine would have these).
      - name: Install prerequisites
        run: ${{ matrix.bootstrap }}

      - uses: actions/checkout@v7

      - name: Install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"

      - name: chezmoi init + apply
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          chezmoi init --apply --source="$GITHUB_WORKSPACE"

      - name: Verify installation
        run: |
          export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$PATH"
          for cmd in ${{ matrix.commands }}; do
            command -v "$cmd" || { echo "::error::$cmd not found"; exit 1; }
          done
          test -f ~/.config/fish/config.fish
          test -f ~/.config/herdr/config.toml
          test -f ~/.config/nvim/init.lua

  macos:
    name: macOS
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"

      - name: chezmoi init + apply
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          chezmoi init --apply --source="$GITHUB_WORKSPACE"

      - name: Verify installation
        run: |
          # go and the other language runtimes are skipped in CI (CODESPACES),
          # so only the always-installed CLI tools are verified here.
          export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$PATH"
          for cmd in fish nvim gh fd rg zoxide bat fzf ghq mise herdr claude; do
            command -v "$cmd" || { echo "::error::$cmd not found"; exit 1; }
          done
          test -f ~/.config/fish/config.fish
          test -f ~/.config/herdr/config.toml
          test -f ~/.config/nvim/init.lua
